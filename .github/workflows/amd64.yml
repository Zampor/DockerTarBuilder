name: Build Docker Tars (amd64)

on:
  workflow_dispatch:
    inputs:
      images:
        description: 'Comma-separated list of images to download'
        required: true
        default: "ghcr.io/dify-ai/dify:latest,postgres:15,redis:7,traefik:2.10"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出仓库
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. 登录 GHCR
      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      # 3. 安装 Python（如果 DockerTarBuilder 需要 Python）
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install requirements
        run: |
          pip install -r requirements.txt || echo "No requirements.txt found, skip"

      # 4. 拉取镜像并导出 tar
      - name: Pull and save Docker images
        run: |
          echo "Images to pull: ${{ github.event.inputs.images }}"
          IFS=',' read -ra IMAGES <<< "${{ github.event.inputs.images }}"
          for image in "${IMAGES[@]}"; do
            echo "Pulling $image..."
            docker pull $image
            tarfile=$(echo $image | tr "/:" "_").tar
            echo "Saving $image to $tarfile"
            docker save -o $tarfile $image
          done

      # 5. 上传 artifact (v4)
      - name: Upload tar files
        uses: actions/upload-artifact@v4
        with:
          name: docker-tar-files
          path: "*.tar"
